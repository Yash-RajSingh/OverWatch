  <!-- MAIN BODY -->
    <div class="wrapper">
        <div class="title-text">
          <div class="title login">Login Form</div>
          <div class="title signup">Signup Form</div>
        </div>
        <div class="form-container">
          <div class="slide-controls">
            <input type="radio" name="slide" id="login" checked>
            <input type="radio" name="slide" id="signup">
            <label for="login" class="slide login">Login</label>
            <label for="signup" class="slide signup">Signup</label>
            <div class="slider-tab"></div>
          </div>
          <div class="form-inner">
            <form action="#" class="login">
              <div class="field">
                <input type="text" id="lemail" autocomplete="off" placeholder="Email Address" required >
              </div>
              <div class="field">
                <input type="password" id="lpass" autocomplete="off" placeholder="Password" required>
              </div>
              <br>
              <div class="pass-link"><a href="#">Forgot password?</a></div>
              <div class="field btn">
                <div class="btn-layer"></div>
                <input type="submit" value="Login">
              </div>
              <div class="signup-link">Not a member? <a href="">Signup now</a></div>
            </form>
            <form action="#" class="signup">
              <div class="field">
                <input type="text" id="sname" autocomplete="off" placeholder="Username" required>
              </div>
              <div class="field">
                <input type="text" id="semail" autocomplete="off" placeholder="Email Address" required>
              </div>
              <div class="field">
                <input type="password" id="spass" autocomplete="off" placeholder="Password" required>
              </div>
              <div class="field">
                <input type="text" id="secquestion" autocomplete="off" placeholder="Security Question" required>
              </div>
              <div class="field">
                <input type="password" id="secanswer" autocomplete="off" placeholder="Security Answer" required>
              </div>
              <div class="field btn">
                <div class="btn-layer"></div>
                <input type="submit" value="Signup">
              </div>
            </form>
          </div>
        </div>
      </div>
      <div id="response">
      </div>

    <script src="https://code.jquery.com/jquery-3.2.1.slim.min.js" integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN" crossorigin="anonymous"></script>
